<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Router</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
        }

        h2 { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #444;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button {
            padding: 10px 24px;
            background: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background: #1a252f; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .button-group {
            display: flex;
            gap: 12px;
        }

        .btn-reset {
            background: #95a5a6;
        }

        .btn-reset:hover {
            background: #7f8c8d;
        }
        .autocomplete-container {
            position: relative;
            margin-bottom: 16px;
        }

        .tags-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .pill {
            background: #e1f0fa;
            color: #2980b9;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            border: 1px solid #b9dcf2;
        }

        .pill-close {
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            color: #2980b9;
        }

        .pill-close:hover { color: #c0392b; }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .dropdown-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }

        .dropdown-item:hover { background: #f1f8ff; }
        .dropdown-item:last-child { border-bottom: none; }

        #error {
            color: #c0392b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
            padding: 10px;
            background: #fadbd8;
            border-radius: 4px;
        }

        #result {
            margin-top: 24px;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 16px;
            font-size: 13px;
            white-space: pre-wrap;
            display: none;
        }
    </style>
</head>
<body>

<h2>Patient Router</h2>

<label>Symptoms</label>
<div class="autocomplete-container">
    <div id="symptoms-tags" class="tags-display"></div>
    <input type="text" id="symptoms-input" placeholder="Type a symptom and select..." autocomplete="off" style="margin-bottom: 0;">
    <div id="symptoms-dropdown" class="dropdown-menu"></div>
</div>

<label>Vitals</label>
<div class="autocomplete-container">
    <div id="vitals-tags" class="tags-display"></div>
    <input type="text" id="vitals-input" placeholder="Type a vital sign and select..." autocomplete="off" style="margin-bottom: 0;">
    <div id="vitals-dropdown" class="dropdown-menu"></div>
</div>

<label>Gender</label>
<select id="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
</select>

<label>Age</label>
<input id="age" type="number" placeholder="e.g. 45">

<label>Duration (days)</label>
<input id="duration" type="number" placeholder="e.g. 3">

<div class="button-group">
    <button id="btn" onclick="predict()">Predict</button>
    <button id="reset-btn" class="btn-reset" onclick="resetForm()">Reset</button>
</div>
<div id="error"></div>

<h3>Result</h3>
<pre id="result"></pre>

<div id="feedback-container" style="display: none; margin-top: 24px; padding: 16px; background: #e8f4f8; border-radius: 4px; border: 1px solid #b9dcf2;">
    <p style="margin-top: 0; font-weight: bold;">Was this prediction correct?</p>
    <button onclick="submitFeedback(true)" style="background: #27ae60;">Yes</button>
    <button onclick="showCorrectionMenu()" style="background: #c0392b;">No</button>

    <div id="correction-menu" style="display: none; margin-top: 16px;">
        <label>Select the correct department:</label>
        <select id="correct-dept" style="width: 100%; padding: 8px; margin-bottom: 12px;">
            <option value="cardiology">Cardiology</option>
            <option value="pulmonology">Pulmonology</option>
            <option value="neurology">Neurology</option>
            <option value="orthopedics">Orthopedics</option>
            <option value="gastrology">Gastrology</option>
            <option value="general">General</option>
        </select>
        <button onclick="submitFeedback(false)" style="background: #2980b9;">Save to Training Data</button>
    </div>
</div>

<script>
    const KNOWN_SYMPTOMS = ["abdominal pain", "blurred vision", "body pain", "breathlessness", "chest pain", "confusion", "cough", "diarrhea", "dizziness", "fatigue", "fever", "headache", "joint pain", "limited movement", "nausea", "stiffness", "sweating", "swelling", "vomiting", "weakness"];
    const KNOWN_VITALS = ["bp_high", "bp_low", "hr_high", "hr_low", "temp_high", "temp_low", "normal"];

    let selectedSymptoms = [];
    let selectedVitals = [];

    function resetForm() {
        selectedSymptoms = [];
        selectedVitals = [];
        document.getElementById('symptoms-tags').innerHTML = '';
        document.getElementById('vitals-tags').innerHTML = '';
        document.getElementById('symptoms-input').value = '';
        document.getElementById('vitals-input').value = '';
        document.getElementById('age').value = '';
        document.getElementById('duration').value = '';
        document.getElementById('gender').value = 'male';
        document.getElementById('error').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('correction-menu').style.display = 'none';
        const btn = document.getElementById('btn');
        btn.disabled = false;
        btn.textContent = 'Predict';
    }

    function setupAutocomplete(inputId, dropdownId, tagsId, optionsList, dataArray) {
        const inputEl = document.getElementById(inputId);
        const dropdownEl = document.getElementById(dropdownId);
        const tagsContainerEl = document.getElementById(tagsId);

        function renderTags() {
            tagsContainerEl.innerHTML = '';
            dataArray.forEach((item, index) => {
                const tag = document.createElement('span');
                tag.className = 'pill';
                tag.textContent = item;

                const closeBtn = document.createElement('span');
                closeBtn.className = 'pill-close';
                closeBtn.innerHTML = '&times;';
                closeBtn.onclick = () => {
                    dataArray.splice(index, 1);
                    renderTags();
                };

                tag.appendChild(closeBtn);
                tagsContainerEl.appendChild(tag);
            });
        }

        inputEl.addEventListener('input', () => {
            const query = inputEl.value.toLowerCase();
            dropdownEl.innerHTML = '';

            if (!query) {
                dropdownEl.style.display = 'none';
                return;
            }

            // Find matches that aren't already selected
            const matches = optionsList.filter(opt =>
                opt.toLowerCase().includes(query) && !dataArray.includes(opt)
            );

            if (matches.length > 0) {
                dropdownEl.style.display = 'block';
                matches.forEach(match => {
                    const item = document.createElement('div');
                    item.className = 'dropdown-item';
                    item.textContent = match;
                    item.onclick = () => {
                        dataArray.push(match);
                        inputEl.value = '';
                        dropdownEl.style.display = 'none';
                        renderTags();
                    };
                    dropdownEl.appendChild(item);
                });
            } else {
                dropdownEl.style.display = 'none';
            }
        });

        // Hide dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== inputEl && e.target !== dropdownEl) {
                dropdownEl.style.display = 'none';
            }
        });
    }

    setupAutocomplete('symptoms-input', 'symptoms-dropdown', 'symptoms-tags', KNOWN_SYMPTOMS, selectedSymptoms);
    setupAutocomplete('vitals-input', 'vitals-dropdown', 'vitals-tags', KNOWN_VITALS, selectedVitals);


    let currentSessionData = {};

    async function predict() {
        const symptoms = selectedSymptoms.join(', ');
        const vitals   = selectedVitals.join(', ');

        const gender   = document.getElementById('gender').value;

        const age      = Number(document.getElementById('age').value);

        const duration = Number(document.getElementById('duration').value);

        const errorDiv = document.getElementById('error');

        errorDiv.style.display = 'none';

        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('correction-menu').style.display = 'none';

        if (selectedSymptoms.length === 0) {
            showError('At least one symptom is required.');
            return;
        }
        if (!age || age <= 0 || age > 120) {
            showError('Please enter a valid age.');
            return;
        }
        if (!duration || duration <= 0) {
            showError('Please enter a valid duration.');
            return;
        }

        const btn = document.getElementById('btn');
        btn.disabled = true;

        btn.textContent = 'Loading...';

        try {
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symptoms, vitals, age, duration })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || err.error || `Server error ${res.status}`);
            }

            const data = await res.json();

            const result = document.getElementById('result');

            result.style.display = 'block';

            result.textContent = JSON.stringify(data, null, 2);

            currentSessionData = {
                symptoms,
                vitals,
                gender,
                age,
                duration,
                priority: data.priority || 'low'
            };
            document.getElementById('feedback-container').style.display = 'block';

        } catch (err) {
            showError(err.message || 'Something went wrong. Is the server running?');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Predict';
        }
    }

    function showCorrectionMenu() {
        document.getElementById('correction-menu').style.display = 'block';
    }

    async function submitFeedback(isCorrect) {
        if (isCorrect) {
            alert("Thanks! The model was accurate.");
            document.getElementById('feedback-container').style.display = 'none';
            return;
        }

        const correctDept = document.getElementById('correct-dept').value;

        const payload = { ...currentSessionData, correct_department: correctDept };

        try {
            const res = await fetch('/feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Correction saved to data.csv successfully!");
                document.getElementById('feedback-container').style.display = 'none';
            } else {
                throw new Error("Failed to save correction.");
            }
        } catch (err) {
            alert("Error saving feedback: " + err.message);
        }
    }

    function showError(msg) {
        const div = document.getElementById('error');
        div.textContent = msg;
        div.style.display = 'block';
    }
</script>

</body>
</html>
