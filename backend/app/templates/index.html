<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Router</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 660px;
            margin: 40px auto;
            padding: 0 20px 60px;
            color: #1a1a1a;
            background: #f5f5f5;
        }

        h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 14px;
            background: #fff;
            color: #1a1a1a;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.12);
        }

        /* Tag autocomplete */
        .autocomplete-container { position: relative; margin-bottom: 14px; }
        .tags-display { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 13px;
        }
        .pill-close { cursor: pointer; font-weight: 700; font-size: 14px; color: #1d4ed8; line-height: 1; }
        .pill-close:hover { color: #dc2626; }
        .ac-input {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 0;
        }
        .ac-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 2px);
            left: 0; right: 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
        }
        .dropdown-item { padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        .dropdown-item:last-child { border-bottom: none; }
        .dropdown-item:hover { background: #eff6ff; }

        /* Buttons */
        .button-group { display: flex; gap: 10px; margin-top: 4px; }
        button {
            padding: 10px 22px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        #btn { background: #1e3a5f; color: #fff; }
        #btn:hover { background: #162d4a; }
        #btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-reset { background: #e5e7eb; color: #374151; }
        .btn-reset:hover { background: #d1d5db; }

        /* Error */
        #error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #991b1b;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 10px;
        }

        /* Priority banner */
        .priority-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid transparent;
        }
        .priority-high   { background: #fef2f2; border-color: #fca5a5; }
        .priority-medium { background: #fff7ed; border-color: #fdba74; }
        .priority-low    { background: #f0fdf4; border-color: #86efac; }

        .priority-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            color: #fff;
            white-space: nowrap;
            letter-spacing: .4px;
        }
        .priority-high   .priority-badge { background: #dc2626; }
        .priority-medium .priority-badge { background: #ea580c; }
        .priority-low    .priority-badge { background: #16a34a; }

        .priority-text { flex: 1; }
        .priority-text strong { font-size: 15px; display: block; }
        .priority-text span   { font-size: 13px; color: #555; }

        .emergency-pill {
            display: inline-block;
            background: #dc2626;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: .5px;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .65; } }

        /* Result rows */
        .result-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .result-row .rl { color: #555; }
        .result-row .rv { font-weight: 600; color: #1a1a1a; text-align: right; }

        /* Department ranking */
        .dept-list { margin-top: 12px; }
        .dept-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }
        .dept-item:last-child { border-bottom: none; }
        .dept-name { flex: 1; font-weight: 500; text-transform: capitalize; }
        .conf-bar-wrap { width: 120px; background: #e5e7eb; border-radius: 4px; height: 6px; overflow: hidden; }
        .conf-bar { height: 100%; background: #2563eb; border-radius: 4px; }
        .conf-pct { width: 42px; text-align: right; color: #555; font-size: 12px; }

        /* Reasons */
        .reasons-list { margin: 0; padding: 0 0 0 16px; font-size: 13px; line-height: 1.8; color: #333; }

        /* Warning note */
        .warning-note {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: #6b7280;
            margin-top: 10px;
        }

        /* Raw JSON */
        details summary { cursor: pointer; font-size: 12px; color: #6b7280; margin-top: 12px; }
        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            font-size: 11px;
            overflow-x: auto;
            margin-top: 6px;
            white-space: pre-wrap;
        }

        /* Feedback */
        #feedback-container { display: none; }
        #feedback-container p { margin-top: 0; font-weight: 600; font-size: 14px; }
        .btn-yes { background: #16a34a; color: #fff; }
        .btn-yes:hover { background: #15803d; }
        .btn-no  { background: #dc2626; color: #fff; }
        .btn-no:hover { background: #b91c1c; }
        #correction-menu { display: none; margin-top: 16px; }
        #correction-menu select { margin-bottom: 10px; }
        .btn-save { background: #2563eb; color: #fff; }
        .btn-save:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<h1>Patient Router</h1>
<p class="subtitle">Clinical Decision Support — Department Triage</p>

<div class="card">
    <label>Symptoms <span style="color:#dc2626">*</span></label>
    <div class="autocomplete-container">
        <div id="symptoms-tags" class="tags-display"></div>
        <input class="ac-input" type="text" id="symptoms-input" placeholder="Type a symptom and select..." autocomplete="off">
        <div id="symptoms-dropdown" class="dropdown-menu"></div>
    </div>

    <label>Vitals</label>
    <div class="autocomplete-container">
        <div id="vitals-tags" class="tags-display"></div>
        <input class="ac-input" type="text" id="vitals-input" placeholder="Type a vital sign and select..." autocomplete="off">
        <div id="vitals-dropdown" class="dropdown-menu"></div>
    </div>

    <div style="display:flex; gap:16px;">
        <div style="flex:1;">
            <label>Age <span style="color:#dc2626">*</span></label>
            <input id="age" type="number" min="0" max="120" placeholder="e.g. 45">
        </div>
        <div style="flex:1;">
            <label>Gender</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
    </div>

    <label>Duration (days) <span style="color:#dc2626">*</span></label>
    <input id="duration" type="number" placeholder="e.g. 3">

    <div id="error"></div>

    <div class="button-group">
        <button id="btn" onclick="predict()">Predict</button>
        <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>
</div>

<div class="card" id="result-card" style="display:none;">
    <div id="priority-banner"></div>
    <div id="result-body"></div>
</div>

<div class="card" id="feedback-container">
    <p>Was this prediction correct?</p>
    <div class="button-group">
        <button class="btn-yes" onclick="submitFeedback(true)">✓ Yes</button>
        <button class="btn-no"  onclick="showCorrectionMenu()">✗ No</button>
    </div>
    <div id="correction-menu">
        <label style="margin-top:14px;">Select the correct department:</label>
        <select id="correct-dept">
            <option value="cardiology">Cardiology</option>
            <option value="pulmonology">Pulmonology</option>
            <option value="neurology">Neurology</option>
            <option value="orthopedics">Orthopedics</option>
            <option value="gastrology">Gastrology</option>
            <option value="general">General</option>
        </select>
        <button class="btn-save" onclick="submitFeedback(false)">Save to Training Data</button>
    </div>
</div>

<script>
    const KNOWN_SYMPTOMS = ["abdominal pain", "blurred vision", "body pain", "breathlessness", "chest pain", "confusion", "cough", "diarrhea", "dizziness", "fatigue", "fever", "headache", "joint pain", "limited movement", "nausea", "stiffness", "sweating", "swelling", "vomiting", "weakness"];
    const KNOWN_VITALS   = ["bp_high", "bp_low", "hr_high", "hr_low", "temp_high", "temp_low", "normal"];

    let selectedSymptoms   = [];
    let selectedVitals     = [];
    let currentSessionData = {};

    function resetForm() {
        selectedSymptoms = [];
        selectedVitals   = [];
        document.getElementById('symptoms-tags').innerHTML  = '';
        document.getElementById('vitals-tags').innerHTML    = '';
        document.getElementById('symptoms-input').value    = '';
        document.getElementById('vitals-input').value      = '';
        document.getElementById('age').value               = '';
        document.getElementById('duration').value          = '';
        document.getElementById('gender').value            = 'male';
        document.getElementById('error').style.display          = 'none';
        document.getElementById('result-card').style.display    = 'none';
        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('correction-menu').style.display    = 'none';
        const btn = document.getElementById('btn');
        btn.disabled    = false;
        btn.textContent = 'Predict';
    }

    function setupAutocomplete(inputId, dropdownId, tagsId, optionsList, dataArray) {
        const inputEl    = document.getElementById(inputId);
        const dropdownEl = document.getElementById(dropdownId);
        const tagsEl     = document.getElementById(tagsId);

        function renderTags() {
            tagsEl.innerHTML = '';
            dataArray.forEach((item, index) => {
                const tag = document.createElement('span');
                tag.className   = 'pill';
                tag.textContent = item;
                const x = document.createElement('span');
                x.className = 'pill-close';
                x.innerHTML = '&times;';
                x.onclick   = () => { dataArray.splice(index, 1); renderTags(); };
                tag.appendChild(x);
                tagsEl.appendChild(tag);
            });
        }

        inputEl.addEventListener('input', () => {
            const query = inputEl.value.toLowerCase();
            dropdownEl.innerHTML = '';
            if (!query) { dropdownEl.style.display = 'none'; return; }
            const matches = optionsList.filter(o => o.toLowerCase().includes(query) && !dataArray.includes(o));
            if (!matches.length) { dropdownEl.style.display = 'none'; return; }
            dropdownEl.style.display = 'block';
            matches.forEach(match => {
                const item = document.createElement('div');
                item.className   = 'dropdown-item';
                item.textContent = match;
                item.onclick = () => {
                    dataArray.push(match);
                    inputEl.value = '';
                    dropdownEl.style.display = 'none';
                    renderTags();
                };
                dropdownEl.appendChild(item);
            });
        });

        document.addEventListener('click', (e) => {
            if (e.target !== inputEl) dropdownEl.style.display = 'none';
        });
    }

    setupAutocomplete('symptoms-input', 'symptoms-dropdown', 'symptoms-tags', KNOWN_SYMPTOMS, selectedSymptoms);
    setupAutocomplete('vitals-input',   'vitals-dropdown',   'vitals-tags',   KNOWN_VITALS,   selectedVitals);

    async function predict() {
        const symptoms = selectedSymptoms.join(', ');
        const vitals   = selectedVitals.join(', ');
        const gender   = document.getElementById('gender').value;
        const age      = Number(document.getElementById('age').value);
        const duration = Number(document.getElementById('duration').value);

        document.getElementById('error').style.display              = 'none';
        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('correction-menu').style.display    = 'none';
        document.getElementById('result-card').style.display        = 'none';

        if (!selectedSymptoms.length)      { showError('At least one symptom is required.'); return; }
        if (!age || age <= 0 || age > 120) { showError('Please enter a valid age.'); return; }
        if (!duration || duration <= 0)    { showError('Please enter a valid duration.'); return; }

        const btn = document.getElementById('btn');
        btn.disabled    = true;
        btn.textContent = 'Loading...';

        try {
            const res = await fetch('/predict', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ symptoms, vitals, age, duration, gender }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || `Server error ${res.status}`);
            }

            const data = await res.json();
            renderResult(data);

            currentSessionData = { symptoms, vitals, gender, age, duration, priority: data.priority || 'low' };
            document.getElementById('feedback-container').style.display = 'block';

        } catch (err) {
            showError(err.message || 'Something went wrong. Is the server running?');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Predict';
        }
    }

    function renderResult(d) {
        // Priority banner
        const banner = document.getElementById('priority-banner');
        const priorityClass = `priority-${d.priority}`;
        const priorityLabel = d.priority === 'high' ? 'HIGH PRIORITY' : d.priority === 'medium' ? 'MEDIUM PRIORITY' : 'LOW PRIORITY';
        banner.className = `priority-banner ${priorityClass}`;
        banner.innerHTML = `
            <span class="priority-badge">${d.priority.toUpperCase()}</span>
            <div class="priority-text">
                <strong>${priorityLabel}</strong>
                <span>Route to: <strong style="color:#1a1a1a">${d.recommended.replace(/_/g,' ').toUpperCase()}</strong></span>
            </div>
            ${d.emergency ? '<span class="emergency-pill">⚠ EMERGENCY</span>' : ''}
        `;

        // Body
        let html = `
            <div class="result-row"><span class="rl">ML Confidence</span><span class="rv">${(d.confidence * 100).toFixed(1)}%</span></div>
            <div class="result-row"><span class="rl">Model Version</span><span class="rv">${d.model_version}</span></div>
        `;

        // Department ranking
        html += `<div style="margin:14px 0 4px;font-size:13px;font-weight:600;">Department Ranking</div><div class="dept-list">`;
        d.departments.forEach((dept, i) => {
            html += `
                <div class="dept-item">
                    <span style="color:#9ca3af;font-size:12px;width:14px">${i + 1}</span>
                    <span class="dept-name">${dept.department.replace(/_/g, ' ')}</span>
                    <div class="conf-bar-wrap"><div class="conf-bar" style="width:${(dept.confidence * 100).toFixed(0)}%"></div></div>
                    <span class="conf-pct">${(dept.confidence * 100).toFixed(1)}%</span>
                </div>`;
        });
        html += `</div>`;

        // Clinical reasoning
        if (d.reasons && d.reasons.length) {
            html += `<div style="margin:14px 0 6px;font-size:13px;font-weight:600;">Clinical Reasoning</div>
                     <ul class="reasons-list">`;
            d.reasons.forEach(r => { html += `<li>${r}</li>`; });
            html += `</ul>`;
        }

        // Warning
        if (d.warning) {
            html += `<div class="warning-note">ℹ ${d.warning}</div>`;
        }

        // Raw JSON
        html += `<details><summary>View raw output</summary><pre>${JSON.stringify(d, null, 2)}</pre></details>`;

        document.getElementById('result-body').innerHTML = html;
        document.getElementById('result-card').style.display = 'block';
    }

    function showCorrectionMenu() {
        document.getElementById('correction-menu').style.display = 'block';
    }

    async function submitFeedback(isCorrect) {
        if (isCorrect) {
            alert("Thanks! The model was accurate.");
            document.getElementById('feedback-container').style.display = 'none';
            return;
        }

        const correctDept = document.getElementById('correct-dept').value;
        const payload     = { ...currentSessionData, correct_department: correctDept };

        try {
            const res = await fetch('/feedback', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload),
            });
            if (res.ok) {
                alert("Correction saved to data.csv successfully!");
                document.getElementById('feedback-container').style.display = 'none';
            } else {
                throw new Error("Failed to save correction.");
            }
        } catch (err) {
            alert("Error saving feedback: " + err.message);
        }
    }

    function showError(msg) {
        const div = document.getElementById('error');
        div.textContent   = msg;
        div.style.display = 'block';
    }
</script>
</body>
</html>
