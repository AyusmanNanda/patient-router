<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Router</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
        }

        h2 { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #555;
        }

        button {
            padding: 9px 24px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #error {
            color: #c0392b;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        #result {
            margin-top: 24px;
            background: #f7f7f7;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 16px;
            font-size: 13px;
            white-space: pre-wrap;
            display: none;
        }
    </style>
</head>
<body>

<h2>Patient Router</h2>

<label>Symptoms (comma separated)</label>
<input id="symptoms" placeholder="e.g. chest pain, breathlessness">

<label>Vitals (comma separated, optional)</label>
<input id="vitals" placeholder="e.g. bp_high, hr_high">

<label>Age</label>
<input id="age" type="number" placeholder="e.g. 45">

<label>Duration (days)</label>
<input id="duration" type="number" placeholder="e.g. 3">

<button id="btn" onclick="predict()">Predict</button>
<div id="error"></div>

<h3>Result</h3>
<pre id="result"></pre>

<script>
    async function predict() {
        const symptoms = document.getElementById('symptoms').value.trim();
        const vitals   = document.getElementById('vitals').value.trim();
        const age      = Number(document.getElementById('age').value);
        const duration = Number(document.getElementById('duration').value);

        const errorDiv = document.getElementById('error');
        errorDiv.style.display = 'none';

        if (!symptoms) { showError('Symptoms are required.'); return; }
        if (!age || age <= 0 || age > 120) { showError('Please enter a valid age.'); return; }
        if (!duration || duration <= 0) { showError('Please enter a valid duration.'); return; }

        const btn = document.getElementById('btn');
        btn.disabled = true;
        btn.textContent = 'Loading...';

        try {
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symptoms, vitals, age, duration })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || err.error || `Server error ${res.status}`);
            }

            const data = await res.json();
            const result = document.getElementById('result');
            result.style.display = 'block';
            result.textContent = JSON.stringify(data, null, 2);

        } catch (err) {
            showError(err.message || 'Something went wrong. Is the server running?');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Predict';
        }
    }

    function showError(msg) {
        const div = document.getElementById('error');
        div.textContent = msg;
        div.style.display = 'block';
    }
</script>

</body>
</html>
